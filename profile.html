<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - SENYA</title>
    <link rel="stylesheet" href="styles.css">
</head>

<header>
    <div class="logo">
        SEN<span class="logo-y">Y</span>A
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Profile</a>
        <a href="#">About Us</a>
        <a href="#">Contact</a>
    </nav>

    <button class="btn-help">
        Get Help
    </button>
</header>

<body>

<div class="container">
    <div class="profile-container">
        <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="profile-pic">
            <img id="previewImage"
                src="img/random.jpg"
                alt="Foto">
            <h3 id="displayName">
                Ariana Fernández
            </h3>
            <p>Customer</p>

            <div class="upload-btn">
                <input type="file" id="imageUpload" accept="image/*">
                <label for="imageUpload">
                    Cambiar foto
                </label>
            </div>
        </div>

            <div class="menu">
                <a href="#" class="active">👤 Personal information</a>
                <a href="#">🔒 Login & Password</a>
                <a href="#">🚪 Log Out</a>
            </div>
    </div>

    <!-- FORMULARIO -->

            <div class="profile-card">
                <h2>Personal information</h2>

<div class="gender">
<input type="radio" name="gender" checked> Female
<input type="radio" name="gender"> Male
</div>

<div class="form-grid">

<div class="form-group">
<label>First Name</label>
<input type="text" id="firstName">
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" id="lastName">
</div>

<div class="form-group full">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="form-group full">
<label>Address</label>
<input type="text" id="address">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" id="phone">
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" id="birth">
</div>

</div>

<div class="buttons">
<button class="discard" onclick="resetData()">
Discard Changes
</button>

<button class="save" onclick="saveData()">
Save Changes
</button>
</div>

</div>

</div>

</div>

<script>

/* DATOS INICIALES */

const defaultData = {

firstName:"Ariana",
lastName:"Fernández",
email:"arianaabfdz@gmail.com",
address:"San Salvador, San Martín",
phone:"+503 7495 2947",
birth:"2000-11-21"

};

/* CARGAR */

function loadData(){

const user =
JSON.parse(localStorage.getItem("userProfile"))
|| defaultData;

firstName.value=user.firstName;
lastName.value=user.lastName;
email.value=user.email;
address.value=user.address;
phone.value=user.phone;
birth.value=user.birth;

displayName.textContent=
user.firstName + " " + user.lastName;

}

/* GUARDAR */

function saveData(){

const user={

firstName:firstName.value,
lastName:lastName.value,
email:email.value,
address:address.value,
phone:phone.value,
birth:birth.value

};

localStorage.setItem(
"userProfile",
JSON.stringify(user)
);

displayName.textContent =
user.firstName + " " + user.lastName;

alert("Cambios guardados correctamente");

}

/* RESETEAR */

function resetData(){

localStorage.removeItem("userProfile");
loadData();

alert("Datos restaurados");

}

/* FOTO */

imageUpload.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

previewImage.src=e.target.result;

localStorage.setItem(
"profileImage",
e.target.result
);

}

reader.readAsDataURL(file);

}

});

window.onload=()=>{

loadData();

const savedImage=
localStorage.getItem("profileImage");

if(savedImage){

previewImage.src=savedImage;

}

};

</script>

</body>
</html>
